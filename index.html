<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="map" style="height:80vh;"></div>
    <script>
        const map = L.map('map').setView([47.5746, 34.4396], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const urlParams = new URLSearchParams(window.location.search);
        const fieldId = urlParams.get('id');

        if (fieldId !== null) {
            alert("Загружаю данные поля №" + (parseInt(fieldId) + 1));
            // Здесь будет логика отображения точек этого поля
        }

        function save(name, pts) {
            window.Telegram.WebApp.sendData(JSON.stringify({name: name, pts: pts}));
            window.Telegram.WebApp.close();
        }
    </script>
</body>
</html>
